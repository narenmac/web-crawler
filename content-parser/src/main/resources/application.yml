server:
  port: 8083

spring:
  application:
    name: content-parser

app:
  azure:
    storage:
      connection-string: "DefaultEndpointsProtocol=https;AccountName=YOUR_ACCOUNT_NAME;AccountKey=YOUR_ACCOUNT_KEY;EndpointSuffix=core.windows.net"
    queues:
      parse-queue: "parse-queue"
      result-queue: "result-queue"
  polling:
    queue-ms: 5000
