server:
  port: 8083
  shutdown: graceful

spring:
  application:
    name: content-parser
  lifecycle:
    timeout-per-shutdown-phase: 30s

app:
  azure:
    storage:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=https;AccountName=YOUR_ACCOUNT_NAME;AccountKey=YOUR_ACCOUNT_KEY;EndpointSuffix=core.windows.net}
    queues:
      parse-queue: ${PARSE_QUEUE_NAME:parse-queue}
      result-queue: ${RESULT_QUEUE_NAME:result-queue}
      parse-poison-queue: ${PARSE_POISON_QUEUE_NAME:parse-queue-poison}
    blobs:
      raw-html-container: ${RAW_HTML_CONTAINER_NAME:raw-html}
  polling:
    queue-ms: ${QUEUE_POLL_MS:1000}
  processing:
    max-dequeue-count: ${MAX_DEQUEUE_COUNT:5}
  shutdown:
    wait-timeout: ${SHUTDOWN_WAIT_TIMEOUT:PT30S}

logging:
  level:
    com.azure.data.tables: ERROR
    com.azure.core.http.policy: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info
