server:
  port: 8081

spring:
  application:
    name: crawler-orchestrator
  quartz:
    job-store-type: memory

app:
  azure:
    storage:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=https;AccountName=YOUR_ACCOUNT_NAME;AccountKey=YOUR_ACCOUNT_KEY;EndpointSuffix=core.windows.net}
    queues:
      url-queue: ${URL_QUEUE_NAME:url-queue}
      parse-queue: ${PARSE_QUEUE_NAME:parse-queue}
      job-control-queue: ${JOB_CONTROL_QUEUE_NAME:job-control-queue}
      result-queue: ${RESULT_QUEUE_NAME:result-queue}
    tables:
      jobs: ${JOBS_TABLE_NAME:jobs}
      schedules: ${SCHEDULES_TABLE_NAME:schedules}
      urlmetadata: ${URL_METADATA_TABLE_NAME:urlmetadata}
    blobs:
      seed-files-container: ${SEED_FILES_CONTAINER_NAME:seed-files}
  max-urls: ${MAX_URLS:100}
  polling:
    job-control-ms: ${JOB_CONTROL_POLL_MS:1000}
    result-queue-ms: ${RESULT_QUEUE_POLL_MS:1000}

logging:
  level:
    com.azure.data.tables: ERROR
    com.azure.core.http.policy: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info
