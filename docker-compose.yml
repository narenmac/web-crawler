version: '3.8'

services:
  # Azure Storage Emulator (Azurite)
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:10002', (r) => process.exit(r.statusCode === 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_AUTH_DISABLED=true
        - REACT_APP_API_URL=http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_started

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      azurite:
        condition: service_healthy
      crawler-orchestrator:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1
      - ORCHESTRATOR_START_ENDPOINT=http://crawler-orchestrator:8081/internal/jobs/start
      - MAX_URLS=20

  # Crawler Orchestrator
  crawler-orchestrator:
    build:
      context: ./crawler-orchestrator
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      azurite:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1
      - MAX_URLS=20

  # URL Fetcher Worker
  url-fetcher:
    build:
      context: ./url-fetcher
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      azurite:
        condition: service_healthy
      crawler-orchestrator:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1

  # Content Parser Worker
  content-parser:
    build:
      context: ./content-parser
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    depends_on:
      azurite:
        condition: service_healthy
      crawler-orchestrator:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - AZURE_STORAGE_CONNECTION_STRING=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1

volumes:
  azurite-data:
