server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    azure:
      active-directory:
        enabled: ${AZURE_AD_ENABLED:true}
        profile:
          tenant-id: ${AZURE_AD_TENANT_ID:YOUR_AZURE_AD_TENANT_ID}
        credential:
          client-id: ${AZURE_AD_CLIENT_ID:YOUR_AZURE_AD_CLIENT_ID}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://login.microsoftonline.com/${spring.cloud.azure.active-directory.profile.tenant-id}/v2.0

app:
  azure:
    storage:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:DefaultEndpointsProtocol=https;AccountName=YOUR_ACCOUNT_NAME;AccountKey=YOUR_ACCOUNT_KEY;EndpointSuffix=core.windows.net}
      seed-container: ${SEED_CONTAINER_NAME:crawler-input}
      content-container: ${CONTENT_CONTAINER_NAME:crawler-content}
    queues:
      job-control-queue: ${JOB_CONTROL_QUEUE_NAME:job-control-queue}
  orchestrator:
    start-endpoint: ${ORCHESTRATOR_START_ENDPOINT:http://localhost:8081/internal/jobs/start}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    local-user-id: ${LOCAL_USER_ID:local-dev-user}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: local
  cloud:
    azure:
      active-directory:
        enabled: false
