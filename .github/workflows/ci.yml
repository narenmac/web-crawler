name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test -- --watchAll=false
      - run: npm run build

  api-gateway:
    name: API Gateway (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - run: mvn verify -B

  crawler-orchestrator:
    name: Crawler Orchestrator (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crawler-orchestrator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - run: mvn verify -B

  url-fetcher:
    name: URL Fetcher (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: url-fetcher
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - run: mvn verify -B

  content-parser:
    name: Content Parser (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: content-parser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - run: mvn verify -B
