name: CD - Deploy to Dev

on:
  push:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: frontend
            context: ./frontend
          - name: api-gateway
            context: ./api-gateway
          - name: crawler-orchestrator
            context: ./crawler-orchestrator
          - name: url-fetcher
            context: ./url-fetcher
          - name: content-parser
            context: ./content-parser
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/web-crawler-${{ matrix.service.name }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_HUB_USERNAME }}/web-crawler-${{ matrix.service.name }}:latest

  deploy:
    name: Deploy to Dev (Terraform)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="environments/dev.tfvars" \
            -var="frontend_image_tag=${{ env.IMAGE_TAG }}" \
            -var="api_gateway_image_tag=${{ env.IMAGE_TAG }}" \
            -var="orchestrator_image_tag=${{ env.IMAGE_TAG }}" \
            -var="url_fetcher_image_tag=${{ env.IMAGE_TAG }}" \
            -var="content_parser_image_tag=${{ env.IMAGE_TAG }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Smoke Test
        run: |
          INGRESS_IP=$(terraform output -raw public_ip_address)
          echo "Testing health endpoint at $INGRESS_IP..."
          sleep 30
          curl -f http://$INGRESS_IP/api/actuator/health || echo "Health check pending..."
