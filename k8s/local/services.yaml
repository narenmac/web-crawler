---
# URL Fetcher (scalable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-fetcher
  namespace: web-crawler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-fetcher
  template:
    metadata:
      labels:
        app: url-fetcher
    spec:
      initContainers:
        - name: wait-for-azurite
          image: busybox:1.36
          command: ['sh', '-c', 'until nslookup azurite.web-crawler.svc.cluster.local; do sleep 2; done && sleep 5']
      containers:
        - name: url-fetcher
          image: web-crawler-url-fetcher:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: crawler-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: url-fetcher-hpa
  namespace: web-crawler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: url-fetcher
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
