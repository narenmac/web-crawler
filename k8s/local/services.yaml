# API Gateway
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: web-crawler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-azurite
          image: busybox:1.36
          command: ['sh', '-c', 'until nslookup azurite.web-crawler.svc.cluster.local; do sleep 2; done && sleep 5']
      containers:
        - name: api-gateway
          image: web-crawler-api-gateway:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: crawler-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: web-crawler
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
