apiVersion: v1
kind: Namespace
metadata:
  name: web-crawler
---
# Azurite - Local Azure Storage Emulator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: azurite
  namespace: web-crawler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azurite
  template:
    metadata:
      labels:
        app: azurite
    spec:
      containers:
        - name: azurite
          image: mcr.microsoft.com/azure-storage/azurite
          ports:
            - containerPort: 10000
              name: blob
            - containerPort: 10001
              name: queue
            - containerPort: 10002
              name: table
          readinessProbe:
            tcpSocket:
              port: 10002
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: azurite
  namespace: web-crawler
spec:
  selector:
    app: azurite
  ports:
    - name: blob
      port: 10000
      targetPort: 10000
    - name: queue
      port: 10001
      targetPort: 10001
    - name: table
      port: 10002
      targetPort: 10002
